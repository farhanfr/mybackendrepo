services:

  postgres:

    image: postgres:17

    container_name: postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: backend_learning

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:8

    container_name: redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  backend:

    build: .

    container_name: backend

    restart: always

    depends_on:
      - postgres
      - redis

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

volumes:

  postgres_data:

  redis_data: